name: Deploy Backend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish backend
        run: dotnet publish ./EvArkadasim.API/EvArkadasim.API.csproj -c Release -r linux-x64 --self-contained true -o ./publish-linux

      - name: Copy backend to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "publish-linux/*"
          target: "/opt/evarkadasim/api"
          strip_components: 1

      - name: Restart backend service
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            chown -R evarkadasim:evarkadasim /opt/evarkadasim/api
            chmod +x /opt/evarkadasim/api/EvArkadasim.API
            systemctl restart evarkadasim-api
            systemctl status evarkadasim-api --no-pager
